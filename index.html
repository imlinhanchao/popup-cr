<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup CR - Test</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f6f8fa; }
    h1 { color: #24292f; }
    button { padding: 8px 16px; background: #0969da; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #0860c8; }
    #my-container { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Popup CR - Demo</h1>
  <p>Click the button below to mount the popup into <code>#my-container</code>.</p>
  <button id="open-btn">Open Popup CR</button>
  <div id="my-container"></div>

  <script src="dist/index.iife.js"></script>
  <script>
    document.getElementById('open-btn').addEventListener('click', function() {
      var container = document.getElementById('my-container');
      // Clear previous instance
      container.innerHTML = '';
      popupCR.mount(container, {
        title: 'Code Review',
        onClose: function() { console.log('Popup closed'); }
      });
    });
  </script>
</body>
</html>
